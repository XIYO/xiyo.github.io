<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamberger</title>
    <script>
        window.onload = () => {
            console.log('log')
            var hamberger = document.querySelector('#hamberger');
            var first = document.querySelector('#first');
            var second = document.querySelector('#second');

            hamberger.addEventListener('click', () => {
                first.classList.toggle('left');
                second.classList.toggle('right');
                first.classList.toggle('rotateR');
                second.classList.toggle('rotateL');
            })
        }
    </script>
    <style>
        #hamberger {
            width: 500px;
            height: 500px;
            background-color: slateblue;
            display: grid;
            overflow: hidden;
            grid-template-rows: repeat(5, 1fr);
            grid-template-areas: 
            "."
            "first"
            "."
            "second"
            ".";
        }
        .line {
            width: 100%;
            height: 100%;
            background-color: tomato;
            transition: 0.2s;
        }
        #first {grid-area: first;}
        #second {grid-area: second;}

        #hamberger:hover > .left {transform: scaleX(0.8) translateX(-12.5%)}
        #hamberger:hover > .right {transform: scaleX(0.8) translateX(12.5%)}

        .rotateR {transform: translateY(100%) rotate(45deg); }
        .rotateL {transform: translateY(-100%) rotate(-45deg);}
        #hamberger:hover > .rotateR {transform: translateY(100%) rotate(45deg) scaleX(0.8); }
        #hamberger:hover > .rotateL {transform: translateY(-100%) rotate(-45deg) scaleX(0.8);}
    </style>
</head>
<body>
    <div id="hamberger">
        <div id="first" class="line left"></div>
        <div id="second" class="line right"></div>
    </div>
</body>
</html>
